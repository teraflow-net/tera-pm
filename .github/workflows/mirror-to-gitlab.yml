name: Mirror to GitLab
on:
  push:
    branches: ['**']
  delete:
    branches: ['**']
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror to GitLab
        run: |
          git remote add gitlab https://root:${{ secrets.GITLAB_TOKEN }}@gitlab.teraflow.net/teraflow/tera-pm.git
          git push gitlab --mirror
